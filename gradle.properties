# Mod Attributes
mod_id=torchtoss
mod_name=TorchToss
mod_version=2.2.0+1.21.7
mod_group=com.iamkaf.torchtoss
mod_author=iamkaf
mod_description=A template for multiplatform mods.
mod_license=MIT
